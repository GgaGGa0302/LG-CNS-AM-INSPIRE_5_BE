server:
  port: 8080

spring:
  application:
    name: LG-CNS-AM-INSPIRE_5_BE

  # mariadb settings
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  ai:
    openai:
      api-key: ${OPEN_AI_KEY}
      chat:
        options:
          model: ${OPEN_AI_MODEL}

  jpa:
    hibernate:
      # create, create-drop, update, none
      ddl-auto: none

      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    # 콘솔 출력
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

  # 아직 사용안해서 주석처리
#  data:
#    redis:
#      host: localhost
#      port: 6379
#      password:
#      timeout: 6000ms

jwt:
    secret: ${JWT_SECRET_KEY}

# OPEN API
openapi:
    serviceKey: ${SERVICE_KEY}
    callbackUrl: ${CALLBACKURL}
    dataType: ${TYPE}